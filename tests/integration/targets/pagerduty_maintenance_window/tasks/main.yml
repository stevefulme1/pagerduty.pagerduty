---
- name: Set test resource names
  ansible.builtin.set_fact:
    test_ep_name: "{{ pagerduty_test_prefix }}ep-mw-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_svc_name: "{{ pagerduty_test_prefix }}svc-mw-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_mw_desc: "{{ pagerduty_test_prefix }}mw-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    # Window starts 1 hour from now, lasts 2 hours
    test_start_time: "{{ '%Y-%m-%dT%H:%M:%SZ' | strftime(ansible_date_time.epoch | int + 3600) }}"
    test_end_time: "{{ '%Y-%m-%dT%H:%M:%SZ' | strftime(ansible_date_time.epoch | int + 10800) }}"

- name: Test pagerduty_maintenance_window lifecycle
  block:
    - name: Create prerequisite escalation policy
      pagerduty.pagerduty.escalation_policy:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_ep_name }}"
        rules:
          - escalation_delay_in_minutes: 30
            targets:
              - type: user_reference
                id: "{{ lookup('env', 'PAGERDUTY_TEST_USER_ID') | default('PXXXXXX', true) }}"
        state: present

    - name: Create prerequisite service
      pagerduty.pagerduty.service:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_svc_name }}"
        escalation_policy: "{{ test_ep_name }}"
        state: present

    - name: Create maintenance window
      pagerduty.pagerduty.maintenance_window:
        api_token: "{{ pagerduty_api_token }}"
        description: "{{ test_mw_desc }}"
        start_time: "{{ test_start_time }}"
        end_time: "{{ test_end_time }}"
        services:
          - "{{ test_svc_name }}"
        state: present
      register: create_result

    - name: Assert maintenance window created
      ansible.builtin.assert:
        that:
          - create_result is changed

    - name: Delete maintenance window
      pagerduty.pagerduty.maintenance_window:
        api_token: "{{ pagerduty_api_token }}"
        id: "{{ create_result.maintenance_window.id }}"
        state: absent
      register: delete_result

    - name: Assert maintenance window deleted
      ansible.builtin.assert:
        that:
          - delete_result is changed

  always:
    - name: Cleanup maintenance window
      pagerduty.pagerduty.maintenance_window:
        api_token: "{{ pagerduty_api_token }}"
        id: "{{ create_result.maintenance_window.id | default('') }}"
        state: absent
      ignore_errors: true
      when: create_result.maintenance_window.id is defined

    - name: Cleanup service
      pagerduty.pagerduty.service:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_svc_name }}"
        escalation_policy: "{{ test_ep_name }}"
        state: absent
      ignore_errors: true

    - name: Cleanup escalation policy
      pagerduty.pagerduty.escalation_policy:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_ep_name }}"
        state: absent
      ignore_errors: true
