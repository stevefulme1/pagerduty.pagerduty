---
- name: Set test resource names
  ansible.builtin.set_fact:
    test_tag_label: "{{ pagerduty_test_prefix }}tag-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"

- name: Test pagerduty_tag lifecycle
  block:
    - name: Create tag
      pagerduty.pagerduty.tag:
        api_token: "{{ pagerduty_api_token }}"
        label: "{{ test_tag_label }}"
        state: present
      register: create_result

    - name: Assert tag created
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.tag.label == test_tag_label

    - name: Delete tag
      pagerduty.pagerduty.tag:
        api_token: "{{ pagerduty_api_token }}"
        label: "{{ test_tag_label }}"
        state: absent
      register: delete_result

    - name: Assert tag deleted
      ansible.builtin.assert:
        that:
          - delete_result is changed

  always:
    - name: Cleanup tag
      pagerduty.pagerduty.tag:
        api_token: "{{ pagerduty_api_token }}"
        label: "{{ test_tag_label }}"
        state: absent
      failed_when: false
