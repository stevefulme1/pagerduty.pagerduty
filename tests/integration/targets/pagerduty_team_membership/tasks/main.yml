---
- name: Set test resource names
  ansible.builtin.set_fact:
    test_team_name: "{{ pagerduty_test_prefix }}tm-team-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_user_name: "{{ pagerduty_test_prefix }}tm-user-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_user_email: "{{ pagerduty_test_prefix }}tm-{{ lookup('password', '/dev/null chars=ascii_lowercase length=8') }}@example.com"

- name: Test pagerduty_team_membership lifecycle
  block:
    - name: Create prerequisite team
      pagerduty.pagerduty.team:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_team_name }}"
        state: present

    - name: Create prerequisite user
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        state: present

    - name: Add user to team
      pagerduty.pagerduty.team_membership:
        api_token: "{{ pagerduty_api_token }}"
        team: "{{ test_team_name }}"
        user: "{{ test_user_email }}"
        role: responder
        state: present
      register: add_result

    - name: Assert membership added
      ansible.builtin.assert:
        that:
          - add_result is changed

    - name: Add user to team again (idempotent)
      pagerduty.pagerduty.team_membership:
        api_token: "{{ pagerduty_api_token }}"
        team: "{{ test_team_name }}"
        user: "{{ test_user_email }}"
        role: responder
        state: present
      register: idem_result

    - name: Assert idempotent
      ansible.builtin.assert:
        that:
          - idem_result is not changed

    - name: Remove user from team
      pagerduty.pagerduty.team_membership:
        api_token: "{{ pagerduty_api_token }}"
        team: "{{ test_team_name }}"
        user: "{{ test_user_email }}"
        state: absent
      register: remove_result

    - name: Assert membership removed
      ansible.builtin.assert:
        that:
          - remove_result is changed

  always:
    - name: Cleanup membership
      pagerduty.pagerduty.team_membership:
        api_token: "{{ pagerduty_api_token }}"
        team: "{{ test_team_name }}"
        user: "{{ test_user_email }}"
        state: absent
      ignore_errors: true

    - name: Cleanup user
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        state: absent
      ignore_errors: true

    - name: Cleanup team
      pagerduty.pagerduty.team:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_team_name }}"
        state: absent
      ignore_errors: true
