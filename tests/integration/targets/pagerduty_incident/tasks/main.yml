---
- name: Set test resource names
  ansible.builtin.set_fact:
    test_ep_name: "{{ pagerduty_test_prefix }}ep-inc-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_svc_name: "{{ pagerduty_test_prefix }}svc-inc-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_incident_title: "{{ pagerduty_test_prefix }}incident-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"

- name: Test pagerduty_incident lifecycle
  block:
    - name: Create prerequisite escalation policy
      pagerduty.pagerduty.escalation_policy:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_ep_name }}"
        rules:
          - escalation_delay_in_minutes: 30
            targets:
              - type: user_reference
                id: "{{ lookup('env', 'PAGERDUTY_TEST_USER_ID') | default('PXXXXXX', true) }}"
        state: present

    - name: Create prerequisite service
      pagerduty.pagerduty.service:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_svc_name }}"
        escalation_policy: "{{ test_ep_name }}"
        state: present

    - name: Create incident
      pagerduty.pagerduty.incident:
        api_token: "{{ pagerduty_api_token }}"
        title: "{{ test_incident_title }}"
        service: "{{ test_svc_name }}"
        urgency: low
        state: present
      register: create_result

    - name: Assert incident created
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.incident.title == test_incident_title

    - name: Resolve incident
      pagerduty.pagerduty.incident:
        api_token: "{{ pagerduty_api_token }}"
        id: "{{ create_result.incident.id }}"
        status: resolved
        state: present
      register: resolve_result

    - name: Assert incident resolved
      ansible.builtin.assert:
        that:
          - resolve_result is changed

  always:
    - name: Cleanup incident (resolve)
      pagerduty.pagerduty.incident:
        api_token: "{{ pagerduty_api_token }}"
        id: "{{ create_result.incident.id | default('') }}"
        status: resolved
        state: present
      ignore_errors: true
      when: create_result.incident.id is defined

    - name: Cleanup service
      pagerduty.pagerduty.service:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_svc_name }}"
        escalation_policy: "{{ test_ep_name }}"
        state: absent
      ignore_errors: true

    - name: Cleanup escalation policy
      pagerduty.pagerduty.escalation_policy:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_ep_name }}"
        state: absent
      ignore_errors: true
