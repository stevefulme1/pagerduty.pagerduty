---
- name: Set test resource names
  ansible.builtin.set_fact:
    test_user_name: "{{ pagerduty_test_prefix }}user-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_user_email: "{{ pagerduty_test_prefix }}{{ lookup('password', '/dev/null chars=ascii_lowercase length=8') }}@example.com"

- name: Test pagerduty_user lifecycle
  block:
    - name: Create user
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        role: user
        state: present
      register: create_result

    - name: Assert user created
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.user.name == test_user_name
          - create_result.user.email == test_user_email

    - name: Create user again (idempotent)
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        role: user
        state: present
      register: idem_result

    - name: Assert idempotent
      ansible.builtin.assert:
        that:
          - idem_result is not changed

    - name: Update user role
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        role: limited_user
        state: present
      register: update_result

    - name: Assert user updated
      ansible.builtin.assert:
        that:
          - update_result is changed

    - name: Delete user
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        state: absent
      register: delete_result

    - name: Assert user deleted
      ansible.builtin.assert:
        that:
          - delete_result is changed

  always:
    - name: Cleanup user
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        state: absent
      failed_when: false
