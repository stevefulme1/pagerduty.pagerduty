---
- name: Set test resource names
  ansible.builtin.set_fact:
    test_sched_name: "{{ pagerduty_test_prefix }}sched-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_user_name: "{{ pagerduty_test_prefix }}sched-user-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_user_email: "{{ pagerduty_test_prefix }}sched-{{ lookup('password', '/dev/null chars=ascii_lowercase length=8') }}@example.com"

- name: Test pagerduty_schedule lifecycle
  block:
    - name: Create prerequisite user
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        state: present
      register: user_result

    - name: Create schedule
      pagerduty.pagerduty.schedule:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_sched_name }}"
        time_zone: "UTC"
        schedule_layers:
          - rotation_virtual_start: "2025-01-01T00:00:00Z"
            rotation_turn_length_seconds: 604800
            start: "2025-01-01T00:00:00Z"
            users:
              - user:
                  type: user_reference
                  id: "{{ user_result.user.id }}"
        state: present
      register: create_result

    - name: Assert schedule created
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.schedule.name == test_sched_name

    - name: Delete schedule
      pagerduty.pagerduty.schedule:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_sched_name }}"
        time_zone: "UTC"
        state: absent
      register: delete_result

    - name: Assert schedule deleted
      ansible.builtin.assert:
        that:
          - delete_result is changed

  always:
    - name: Cleanup schedule
      pagerduty.pagerduty.schedule:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_sched_name }}"
        time_zone: "UTC"
        state: absent
      failed_when: false

    - name: Cleanup user
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        state: absent
      failed_when: false
