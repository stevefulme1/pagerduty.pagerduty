---
- name: Set test resource names
  ansible.builtin.set_fact:
    test_ep_name: "{{ pagerduty_test_prefix }}ep-svc-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_svc_name: "{{ pagerduty_test_prefix }}svc-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"

- name: Test pagerduty_service lifecycle
  block:
    - name: Create prerequisite escalation policy
      pagerduty.pagerduty.escalation_policy:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_ep_name }}"
        rules:
          - escalation_delay_in_minutes: 30
            targets:
              - type: user_reference
                id: "{{ lookup('env', 'PAGERDUTY_TEST_USER_ID') | default('PXXXXXX', true) }}"
        state: present
      register: ep_result

    - name: Create service
      pagerduty.pagerduty.service:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_svc_name }}"
        description: "Integration test service"
        escalation_policy: "{{ test_ep_name }}"
        state: present
      register: create_result

    - name: Assert service created
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.service.name == test_svc_name

    - name: Create service again (idempotent)
      pagerduty.pagerduty.service:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_svc_name }}"
        description: "Integration test service"
        escalation_policy: "{{ test_ep_name }}"
        state: present
      register: idem_result

    - name: Assert idempotent
      ansible.builtin.assert:
        that:
          - idem_result is not changed

    - name: Update service description
      pagerduty.pagerduty.service:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_svc_name }}"
        description: "Updated description"
        escalation_policy: "{{ test_ep_name }}"
        state: present
      register: update_result

    - name: Assert service updated
      ansible.builtin.assert:
        that:
          - update_result is changed

    - name: Delete service
      pagerduty.pagerduty.service:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_svc_name }}"
        escalation_policy: "{{ test_ep_name }}"
        state: absent
      register: delete_result

    - name: Assert service deleted
      ansible.builtin.assert:
        that:
          - delete_result is changed

  always:
    - name: Cleanup service
      pagerduty.pagerduty.service:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_svc_name }}"
        escalation_policy: "{{ test_ep_name }}"
        state: absent
      ignore_errors: true

    - name: Cleanup escalation policy
      pagerduty.pagerduty.escalation_policy:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_ep_name }}"
        state: absent
      ignore_errors: true
