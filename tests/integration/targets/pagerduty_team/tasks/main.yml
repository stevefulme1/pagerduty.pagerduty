---
- name: Set test resource names
  ansible.builtin.set_fact:
    test_team_name: "{{ pagerduty_test_prefix }}team-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"

- name: Test pagerduty_team lifecycle
  block:
    - name: Create team
      pagerduty.pagerduty.team:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_team_name }}"
        description: "Integration test team"
        state: present
      register: create_result

    - name: Assert team created
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.team.name == test_team_name

    - name: Create team again (idempotent)
      pagerduty.pagerduty.team:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_team_name }}"
        description: "Integration test team"
        state: present
      register: idem_result

    - name: Assert idempotent
      ansible.builtin.assert:
        that:
          - idem_result is not changed

    - name: Delete team
      pagerduty.pagerduty.team:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_team_name }}"
        state: absent
      register: delete_result

    - name: Assert team deleted
      ansible.builtin.assert:
        that:
          - delete_result is changed

  always:
    - name: Cleanup team
      pagerduty.pagerduty.team:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_team_name }}"
        state: absent
      failed_when: false
