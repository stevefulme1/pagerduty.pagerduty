---
- name: Set test resource names
  ansible.builtin.set_fact:
    test_ep_name: "{{ pagerduty_test_prefix }}ep-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_user_name: "{{ pagerduty_test_prefix }}ep-user-{{ lookup('password', '/dev/null chars=ascii_lowercase length=6') }}"
    test_user_email: "{{ pagerduty_test_prefix }}ep-{{ lookup('password', '/dev/null chars=ascii_lowercase length=8') }}@example.com"

- name: Test pagerduty_escalation_policy lifecycle
  block:
    - name: Create prerequisite user
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        state: present
      register: user_result

    - name: Create escalation policy
      pagerduty.pagerduty.escalation_policy:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_ep_name }}"
        description: "Integration test EP"
        num_loops: 1
        rules:
          - escalation_delay_in_minutes: 30
            targets:
              - type: user_reference
                id: "{{ user_result.user.id }}"
        state: present
      register: create_result

    - name: Assert escalation policy created
      ansible.builtin.assert:
        that:
          - create_result is changed
          - create_result.escalation_policy.name == test_ep_name

    - name: Create escalation policy again (idempotent)
      pagerduty.pagerduty.escalation_policy:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_ep_name }}"
        description: "Integration test EP"
        num_loops: 1
        rules:
          - escalation_delay_in_minutes: 30
            targets:
              - type: user_reference
                id: "{{ user_result.user.id }}"
        state: present
      register: idem_result

    - name: Assert idempotent
      ansible.builtin.assert:
        that:
          - idem_result is not changed

    - name: Delete escalation policy
      pagerduty.pagerduty.escalation_policy:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_ep_name }}"
        state: absent
      register: delete_result

    - name: Assert escalation policy deleted
      ansible.builtin.assert:
        that:
          - delete_result is changed

  always:
    - name: Cleanup escalation policy
      pagerduty.pagerduty.escalation_policy:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_ep_name }}"
        state: absent
      ignore_errors: true

    - name: Cleanup user
      pagerduty.pagerduty.user:
        api_token: "{{ pagerduty_api_token }}"
        name: "{{ test_user_name }}"
        email: "{{ test_user_email }}"
        state: absent
      ignore_errors: true
