---
# PagerDuty API authentication token
pagerduty_api_token: ""

# Action to perform: audit or migrate
# audit  - List all rulesets and rules, output migration report
# migrate - Convert rulesets to event orchestration
migration_action: "audit"

# Specific legacy ruleset ID to migrate (optional)
# If not specified, all rulesets will be processed
migration_legacy_ruleset_id: ""

# Whether to disable the legacy ruleset after migration
migration_disable_legacy: true
