---
# Sub-task: Migrate a single ruleset to event orchestration
# Called from main.yml with _ruleset loop_var

- name: "Get rules for ruleset {{ _ruleset.name | default(_ruleset.id) }}"
  pagerduty.pagerduty.ruleset_rule_info:
    api_token: "{{ migration_api_token }}"
    ruleset_id: "{{ _ruleset.id }}"
  register: migration_ruleset_rules

- name: "Display rules found for {{ _ruleset.name | default(_ruleset.id) }}"
  ansible.builtin.debug:
    msg: "Ruleset '{{ _ruleset.name | default(_ruleset.id) }}' has {{ migration_ruleset_rules.rules | default([]) | length }} rule(s) to migrate"

- name: "Create event orchestration for {{ _ruleset.name | default(_ruleset.id) }}"
  pagerduty.pagerduty.event_orchestration:
    api_token: "{{ migration_api_token }}"
    name: "{{ _ruleset.name | default('Migrated Orchestration') }} (migrated)"
    description: "Migrated from legacy ruleset {{ _ruleset.id }}"
    state: present
  register: migration_new_orch

- name: "Display orchestration created"
  ansible.builtin.debug:
    msg: "Created event orchestration: {{ migration_new_orch.event_orchestration.id | default('unknown') }}"

- name: "Create orchestration rules from legacy rules"
  pagerduty.pagerduty.event_orchestration_rule:
    api_token: "{{ migration_api_token }}"
    orchestration_id: "{{ migration_new_orch.event_orchestration.id }}"
    conditions: "{{ item.conditions | default({}) }}"
    actions: "{{ item.actions | default({}) }}"
    label: "Migrated rule {{ loop.index }} from {{ _ruleset.name | default(_ruleset.id) }}"
    state: present
  loop: "{{ migration_ruleset_rules.rules | default([]) }}"
  loop_control:
    label: "Rule {{ ansible_loop.index }} of {{ migration_ruleset_rules.rules | default([]) | length }}"
    extended: true
  register: migration_orch_rules
  when: migration_ruleset_rules.rules | default([]) | length > 0

- name: "Disable legacy ruleset {{ _ruleset.name | default(_ruleset.id) }}"
  pagerduty.pagerduty.ruleset:
    api_token: "{{ migration_api_token }}"
    id: "{{ _ruleset.id }}"
    state: disabled
  when: migration_disable_legacy | bool
  register: migration_ruleset_disabled

- name: "Display migration status for {{ _ruleset.name | default(_ruleset.id) }}"
  ansible.builtin.debug:
    msg:
      - "Ruleset migration complete:"
      - "  Source: {{ _ruleset.name | default(_ruleset.id) }} ({{ _ruleset.id }})"
      - "  Target: {{ migration_new_orch.event_orchestration.id | default('unknown') }}"
      - "  Rules migrated: {{ migration_ruleset_rules.rules | default([]) | length }}"
      - "  Legacy disabled: {{ migration_disable_legacy }}"
