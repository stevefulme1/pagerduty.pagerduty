---
# PagerDuty API authentication token
service_onboard_api_token: ""

# Service configuration
service_onboard_name: ""
service_onboard_description: ""
service_onboard_escalation_policy: ""

# Schedule configuration (optional - only created if schedule_users is provided)
service_onboard_schedule_name: ""
service_onboard_schedule_tz: "UTC"
service_onboard_schedule_users: []
service_onboard_rotation_seconds: 604800  # 1 week

# Integration configuration
service_onboard_integration_type: "events_api_v2_inbound_integration"

# Service behavior
service_onboard_alert_creation: "create_alerts_and_incidents"
service_onboard_auto_resolve: 14400    # 4 hours in seconds
service_onboard_ack_timeout: 1800  # 30 minutes in seconds

# Tags to apply to the service
# Example:
#   tags:
#     - production
#     - tier-1
#     - platform
service_onboard_tags: []
