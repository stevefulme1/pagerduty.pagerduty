---
# Role: maintenance
# Manage PagerDuty maintenance windows

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - pagerduty_api_token | length > 0
      - maintenance_action in ['create', 'end']
      - maintenance_services | length > 0
    fail_msg: "pagerduty_api_token, maintenance_action (create/end), and maintenance_services must be set"

# === CREATE MAINTENANCE WINDOW ===

- name: Create maintenance window
  when: maintenance_action == 'create'
  block:
    - name: Calculate start time
      ansible.builtin.set_fact:
        _maintenance_start: >-
          {{ '%Y-%m-%dT%H:%M:%SZ' | strftime(ansible_date_time.epoch | int)
             if maintenance_start_time == 'now'
             else maintenance_start_time }}

    - name: Calculate end time
      ansible.builtin.set_fact:
        _maintenance_end: >-
          {{ '%Y-%m-%dT%H:%M:%SZ' | strftime(
               (ansible_date_time.epoch | int) + (maintenance_duration_minutes | int * 60))
             if maintenance_start_time == 'now'
             else
               '%Y-%m-%dT%H:%M:%SZ' | strftime(
                 (maintenance_start_time | to_datetime('%Y-%m-%dT%H:%M:%SZ')).strftime('%s') | int
                 + (maintenance_duration_minutes | int * 60))
          }}

    - name: Display maintenance window plan
      ansible.builtin.debug:
        msg:
          - "Creating maintenance window:"
          - "  Description: {{ maintenance_description }}"
          - "  Services: {{ maintenance_services | join(', ') }}"
          - "  Start: {{ _maintenance_start }}"
          - "  End: {{ _maintenance_end }}"
          - "  Duration: {{ maintenance_duration_minutes }} minutes"

    - name: Create maintenance window
      pagerduty.pagerduty.maintenance_window:
        api_token: "{{ pagerduty_api_token }}"
        description: "{{ maintenance_description }}"
        service_names: "{{ maintenance_services }}"
        start_time: "{{ _maintenance_start }}"
        end_time: "{{ _maintenance_end }}"
        state: present
      register: _maintenance_create

    - name: Display maintenance window created
      ansible.builtin.debug:
        msg:
          - "Maintenance window created successfully"
          - "  ID: {{ _maintenance_create.maintenance_window.id | default('unknown') }}"
          - "  Services: {{ maintenance_services | join(', ') }}"
  rescue:
    - name: Maintenance window creation failed
      ansible.builtin.fail:
        msg: "Failed to create maintenance window: {{ ansible_failed_result.msg | default('unknown error') }}"

# === END MAINTENANCE WINDOW ===

- name: End maintenance windows
  when: maintenance_action == 'end'
  block:
    - name: List active maintenance windows
      pagerduty.pagerduty.maintenance_window_info:
        api_token: "{{ pagerduty_api_token }}"
        state: ongoing
      register: _maintenance_list

    - name: Identify maintenance windows for target services
      ansible.builtin.set_fact:
        _windows_to_end: >-
          {{ _maintenance_list.maintenance_windows | default([])
             | selectattr('services', 'defined')
             | list }}

    - name: Display active maintenance windows found
      ansible.builtin.debug:
        msg:
          - "Found {{ _windows_to_end | length }} active maintenance window(s)"
          - "Target services: {{ maintenance_services | join(', ') }}"

    - name: End matching maintenance windows
      pagerduty.pagerduty.maintenance_window:
        api_token: "{{ pagerduty_api_token }}"
        id: "{{ item.id }}"
        state: absent
      loop: "{{ _windows_to_end }}"
      loop_control:
        label: "{{ item.id }} - {{ item.description | default('no description') }}"
      register: _maintenance_end_results
      when: _windows_to_end | length > 0

    - name: Display end results
      ansible.builtin.debug:
        msg: "Ended {{ _windows_to_end | length }} maintenance window(s) for services: {{ maintenance_services | join(', ') }}"
  rescue:
    - name: End maintenance failed
      ansible.builtin.fail:
        msg: "Failed to end maintenance windows: {{ ansible_failed_result.msg | default('unknown error') }}"
