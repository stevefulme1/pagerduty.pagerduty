---
# Role: incident_response
# Automated incident response workflow

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - incident_response_api_token | length > 0
      - incident_response_incident_id | length > 0
      - incident_response_actions | length > 0
    fail_msg: "incident_response_api_token, incident_response_incident_id, and incident_response_actions must be set"

- name: Validate actions list
  ansible.builtin.assert:
    that:
      - item in ['acknowledge', 'add_note', 'run_diagnostics', 'resolve']
    fail_msg: "Invalid action '{{ item }}'. Must be one of: acknowledge, add_note, run_diagnostics, resolve"
  loop: "{{ incident_response_actions }}"
  loop_control:
    label: "{{ item }}"

# --- Acknowledge ---

- name: Acknowledge incident
  when: "'acknowledge' in incident_response_actions"
  block:
    - name: Set incident status to acknowledged
      pagerduty.pagerduty.incident:
        api_token: "{{ incident_response_api_token }}"
        id: "{{ incident_response_incident_id }}"
        status: acknowledged
        state: present
      register: incident_response_ack

    - name: Confirm acknowledgement
      ansible.builtin.debug:
        msg: "Incident {{ incident_response_incident_id }} acknowledged"
  rescue:
    - name: Acknowledgement failed
      ansible.builtin.debug:
        msg: "WARNING: Failed to acknowledge incident {{ incident_response_incident_id }}: {{ ansible_failed_result.msg | default('unknown error') }}"

# --- Add Note ---

- name: Add note to incident
  when: "'add_note' in incident_response_actions and note_content | length > 0"
  block:
    - name: Post note to incident
      pagerduty.pagerduty.incident_note:
        api_token: "{{ incident_response_api_token }}"
        incident: "{{ incident_response_incident_id }}"
        content: "{{ incident_response_note_content }}"
        state: present
      register: incident_response_note

    - name: Confirm note added
      ansible.builtin.debug:
        msg: "Note added to incident {{ incident_response_incident_id }}"
  rescue:
    - name: Note creation failed
      ansible.builtin.debug:
        msg: "WARNING: Failed to add note to incident {{ incident_response_incident_id }}: {{ ansible_failed_result.msg | default('unknown error') }}"

# --- Run Diagnostics ---

- name: Run diagnostics and post results
  when: "'run_diagnostics' in incident_response_actions and diagnostic_commands | length > 0"
  block:
    - name: Add diagnostic start note
      pagerduty.pagerduty.incident_note:
        api_token: "{{ incident_response_api_token }}"
        incident: "{{ incident_response_incident_id }}"
        content: "[Automated] Running {{ incident_response_diagnostic_commands | length }} diagnostic commands on {{ inventory_hostname }}"
        state: present

    - name: Execute diagnostic commands
      ansible.builtin.shell: "{{ item }}"
      loop: "{{ incident_response_diagnostic_commands }}"
      loop_control:
        label: "{{ item }}"
      register: incident_response_diags
      changed_when: false
      failed_when: false

    - name: Build diagnostic report
      ansible.builtin.set_fact:
        incident_response_report: >-
          [Automated Diagnostics from {{ inventory_hostname }}]
          {% for result in incident_response_diags.results %}

          === Command: {{ result.item }} ===
          Exit Code: {{ result.rc }}
          --- stdout ---
          {{ result.stdout | default('(no output)') }}
          {% if result.stderr | default('') | length > 0 %}
          --- stderr ---
          {{ result.stderr }}
          {% endif %}
          {% endfor %}

    - name: Post diagnostic results as incident note
      pagerduty.pagerduty.incident_note:
        api_token: "{{ incident_response_api_token }}"
        incident: "{{ incident_response_incident_id }}"
        content: "{{ incident_response_report }}"
        state: present

    - name: Confirm diagnostics posted
      ansible.builtin.debug:
        msg: "Diagnostic results for {{ incident_response_diagnostic_commands | length }} commands posted to incident {{ incident_response_incident_id }}"
  rescue:
    - name: Diagnostics failed
      ansible.builtin.debug:
        msg: "WARNING: Diagnostics failed for incident {{ incident_response_incident_id }}: {{ ansible_failed_result.msg | default('unknown error') }}"

# --- Resolve ---

- name: Resolve incident
  when: "'resolve' in incident_response_actions"
  block:
    - name: Add resolution note
      pagerduty.pagerduty.incident_note:
        api_token: "{{ incident_response_api_token }}"
        incident: "{{ incident_response_incident_id }}"
        content: "[Automated Resolution] {{ incident_response_resolve_message }}"
        state: present

    - name: Set incident status to resolved
      pagerduty.pagerduty.incident:
        api_token: "{{ incident_response_api_token }}"
        id: "{{ incident_response_incident_id }}"
        status: resolved
        state: present
      register: incident_response_resolve

    - name: Confirm resolution
      ansible.builtin.debug:
        msg: "Incident {{ incident_response_incident_id }} resolved: {{ incident_response_resolve_message }}"
  rescue:
    - name: Resolution failed
      ansible.builtin.debug:
        msg: "WARNING: Failed to resolve incident {{ incident_response_incident_id }}: {{ ansible_failed_result.msg | default('unknown error') }}"

# --- Summary ---

- name: Display response summary
  ansible.builtin.debug:
    msg:
      - "Incident response complete for {{ incident_response_incident_id }}:"
      - "  Actions performed: {{ incident_response_actions | join(', ') }}"
