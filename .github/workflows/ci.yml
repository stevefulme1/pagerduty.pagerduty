
---
name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NAMESPACE: stevefulme1
  COLLECTION: pagerduty

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install yamllint flake8 ansible-lint

      - name: Run yamllint
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

        run: yamllint -c .yamllint roles/ plugins/ meta/ changelogs/ galaxy.yml

      - name: Run flake8
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

        run: flake8 plugins/ --max-line-length=120 --ignore=E402,W503,E303

      - name: Run ansible-lint
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

        run: ansible-lint --strict

  sanity:
    name: Sanity (Ansible ${{ matrix.ansible }} / Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - stable-2.16
          - stable-2.17
          - stable-2.18
          - stable-2.20
        python:
          - "3.12"
          - "3.13"
        exclude:
          # ansible-core 2.16 does not support Python 3.13
          - ansible: stable-2.16
            python: "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python ${{ matrix.python }}

        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core (${{ matrix.ansible }})
        run: pip install "https://github.com/ansible/ansible/archive/${{ matrix.ansible }}.tar.gz"

      - name: Run sanity tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

        run: ansible-test sanity --docker --python ${{ matrix.python }} -v

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Install test dependencies
        run: pip install pytest pytest-mock
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Run unit tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

        run: ansible-test units --docker --python 3.12 -v

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [sanity, unit]
    # Integration tests need a live API — allow failures
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core

      - name: Run integration tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

        run: ansible-test integration --docker --python 3.12 -v
        env:

          STEVEFULME1_PAGERDUTY_API_KEY: ${{ secrets.API_KEY }}


          STEVEFULME1_PAGERDUTY_API_URL: ${{ secrets.API_URL }}
